<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foundation Dashboard</title>
    
    <!-- Script di base per lo stile grafico (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: { 500: '#10b981' },
                        amber: { 500: '#f59e0b' }
                    }
                }
            }
        }
    </script>

    <!-- Motore React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        /* Stili di emergenza per evitare lo schermo bianco/brutto */
        body {
            background-color: #000000 !important;
            color: #ffffff !important;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glass-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-black text-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONE INTEGRATE ---
        const Icons = {
            Home: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
            GraduationCap: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>,
            Shop: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>,
            Plus: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Minus: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            ChevronLeft: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Pin: ({ filled }) => <svg width="16" height="16" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 17v5M9 10.5V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v7.5l2 3.5v2H7v-2l2-3.5z"></path></svg>,
            Camera: () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>,
            Gift: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>
        };

        const FIXED_SUBJECTS = [
            { id: 'it-o', name: 'Italiano Orale' }, { id: 'it-s', name: 'Italiano Scritto' },
            { id: 'lat-o', name: 'Latino Orale' }, { id: 'lat-s', name: 'Latino Scritto' },
            { id: 'gre-o', name: 'Greco Orale' }, { id: 'gre-s', name: 'Greco Scritto' },
            { id: 'mat', name: 'Matematica' }, { id: 'ing', name: 'Inglese' },
            { id: 'geo', name: 'Geostoria' }, { id: 'civ', name: 'Ed. Civica' },
            { id: 'fis', name: 'Ed. Fisica' }, { id: 'sci', name: 'Scienze Naturali' }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedSubjectId, setSelectedSubjectId] = useState(null);
            const [credits, setCredits] = useState(() => Number(localStorage.getItem('f_credits')) || 0);
            const [grades, setGrades] = useState(() => JSON.parse(localStorage.getItem('f_grades')) || []);
            const [rewards, setRewards] = useState(() => JSON.parse(localStorage.getItem('f_rewards')) || []);
            
            const [newGradeValue, setNewGradeValue] = useState("8.00");
            const [rewardName, setRewardName] = useState("");
            const [rewardCost, setRewardCost] = useState("");
            const [rewardImage, setRewardImage] = useState(null);

            useEffect(() => {
                localStorage.setItem('f_credits', credits);
                localStorage.setItem('f_grades', JSON.stringify(grades));
                localStorage.setItem('f_rewards', JSON.stringify(rewards));
            }, [credits, grades, rewards]);

            // --- LOGICA COLORI ---
            const getColorForGrade = (val) => {
                const v = parseFloat(val);
                if (v >= 8) return "#059669"; // Verde Scuro
                if (v >= 6) return "#4ade80"; // Verde Chiaro
                if (v > 0) return "#ef4444";  // Rosso
                return "#52525b";             // Grigio per le vuote
            };

            const calculateAverage = (id) => {
                const subGrades = grades.filter(g => g.subjectId === id);
                return subGrades.length ? (subGrades.reduce((a, b) => a + parseFloat(b.value), 0) / subGrades.length).toFixed(2) : "0.00";
            };

            const totalAverage = grades.length 
                ? (grades.reduce((a, b) => a + parseFloat(b.value), 0) / grades.length).toFixed(2) 
                : "0.00";

            const addGrade = () => {
                const val = parseFloat(newGradeValue);
                setGrades([...grades, { id: Date.now(), subjectId: selectedSubjectId, value: val }]);
                if (val >= 8) setCredits(c => c + 1.5);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setRewardImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const togglePin = (id) => {
                setRewards(rewards.map(r => ({ ...r, pinned: r.id === id ? !r.pinned : false })));
            };

            const gradeOptions = [];
            for (let v = 10; v >= 2; v -= 0.25) gradeOptions.push(v.toFixed(2));

            const pinnedReward = rewards.find(r => r.pinned);

            // --- GRAFICO A TORTA PRINCIPALE ---
            const AveragePieChart = ({ value }) => {
                const radius = 40;
                const circumference = 2 * Math.PI * radius;
                const progress = (parseFloat(value) / 10) * circumference;
                const color = getColorForGrade(value);
                
                return (
                    <div className="relative flex items-center justify-center w-28 h-28">
                        <svg className="w-full h-full transform -rotate-90">
                            <circle cx="56" cy="56" r={radius} stroke="rgba(255,255,255,0.05)" strokeWidth="8" fill="transparent" />
                            <circle cx="56" cy="56" r={radius} stroke={color} strokeWidth="8" fill="transparent" strokeDasharray={circumference} strokeDashoffset={circumference - progress} strokeLinecap="round" className="transition-all duration-1000 ease-out" />
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center flex-col">
                            <span className="text-2xl font-bold leading-none">{value > 0 ? value : '-'}</span>
                            <span className="text-[9px] uppercase text-zinc-400 font-bold tracking-widest mt-1">Media</span>
                        </div>
                    </div>
                );
            };

            // --- GRAFICO MATERIE ---
            const SmallProgressChart = ({ value }) => {
                const radius = 22;
                const circumference = 2 * Math.PI * radius;
                const progress = (parseFloat(value) / 10) * circumference;
                const color = getColorForGrade(value);
                
                return (
                    <div className="relative flex items-center justify-center mb-2">
                        <svg width="52" height="52" className="transform -rotate-90">
                            <circle cx="26" cy="26" r={radius} stroke="rgba(255,255,255,0.05)" strokeWidth="4" fill="transparent" />
                            <circle cx="26" cy="26" r={radius} stroke={color} strokeWidth="4" fill="transparent" strokeDasharray={circumference} strokeDashoffset={circumference - progress} strokeLinecap="round" className="transition-all duration-500 ease-out" />
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center">
                            <span className="text-xs font-bold" style={{ color: value > 0 ? color : '#52525b' }}>{value > 0 ? value : '-'}</span>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-28 max-w-md mx-auto px-6 bg-black text-white">
                    {/* HEADER */}
                    <header className="pt-10 mb-8 fade-in">
                        <h1 className="text-4xl font-extrabold tracking-tight">Foundation</h1>
                        <p className="text-white text-xs font-bold uppercase tracking-widest opacity-50 mt-1">Reward Dashboard</p>
                    </header>

                    <main className="fade-in">
                        {/* TAB: DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="glass-panel p-6 rounded-[2rem]">
                                    <div className="flex justify-between items-center mb-6">
                                        <div>
                                            <p className="text-zinc-400 text-[10px] uppercase tracking-widest mb-1 font-bold">Crediti Disponibili</p>
                                            <h2 className="text-6xl font-black text-white">{credits.toFixed(1)}</h2>
                                        </div>
                                        <AveragePieChart value={totalAverage} />
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setCredits(c => c + 1)} className="flex-1 bg-white text-black py-4 rounded-2xl font-extrabold flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                            <Icons.Plus /> 1 Sessione
                                        </button>
                                        <button onClick={() => setCredits(c => Math.max(0, c - 1))} className="w-16 glass-panel rounded-2xl flex items-center justify-center text-zinc-400 active:scale-95 hover:bg-white/10 transition-colors">
                                            <Icons.Minus />
                                        </button>
                                    </div>
                                </div>

                                <div className="glass-panel p-6 rounded-[2rem]">
                                    <p className="text-zinc-400 text-[10px] uppercase tracking-widest mb-4 font-bold flex items-center gap-2">
                                        <Icons.Pin filled={true} /> Obiettivo In Corso
                                    </p>
                                    {pinnedReward ? (
                                        <div className="flex items-center gap-4">
                                            <div className="w-16 h-16 rounded-2xl bg-black border border-white/10 overflow-hidden flex-shrink-0 flex items-center justify-center">
                                                {pinnedReward.image ? <img src={pinnedReward.image} className="w-full h-full object-cover" /> : <span className="text-zinc-600"><Icons.Gift /></span>}
                                            </div>
                                            <div className="flex-1">
                                                <div className="flex justify-between items-end mb-2">
                                                    <h4 className="font-bold text-sm text-white truncate">{pinnedReward.name}</h4>
                                                    <span className="text-[10px] font-bold text-zinc-400">{credits.toFixed(0)} / {pinnedReward.cost} CR</span>
                                                </div>
                                                <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                                    <div className="h-full bg-white transition-all duration-700" style={{ width: `${Math.min(100, (credits / pinnedReward.cost) * 100)}%` }}></div>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="py-6 text-center border border-dashed border-white/10 rounded-2xl">
                                            <p className="text-zinc-500 text-xs font-semibold">Nessuna ricompensa fissata.</p>
                                            <p className="text-zinc-600 text-[10px] mt-1">Vai nello shop e seleziona il pin.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TAB: MATERIE E VOTI */}
                        {activeTab === 'subjects' && (
                            <div className="fade-in">
                                {!selectedSubjectId ? (
                                    <div className="grid grid-cols-2 gap-4">
                                        {FIXED_SUBJECTS.map(s => (
                                            <button key={s.id} onClick={() => setSelectedSubjectId(s.id)} className="glass-panel p-5 rounded-[2rem] flex flex-col items-center justify-center hover:bg-white/5 active:scale-95 transition-all">
                                                <SmallProgressChart value={calculateAverage(s.id)} />
                                                <p className="text-zinc-300 text-[10px] uppercase font-bold text-center tracking-tight leading-snug">{s.name}</p>
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <button onClick={() => setSelectedSubjectId(null)} className="text-zinc-400 hover:text-white flex items-center gap-1 text-sm font-bold transition-colors">
                                            <Icons.ChevronLeft /> Materie
                                        </button>
                                        <h2 className="text-3xl font-bold">{FIXED_SUBJECTS.find(s=>s.id === selectedSubjectId).name}</h2>
                                        
                                        <div className="glass-panel p-6 rounded-3xl space-y-4">
                                            <p className="text-zinc-400 text-[10px] uppercase font-bold tracking-widest">Aggiungi Voto (2-10)</p>
                                            <div className="flex gap-3">
                                                <select value={newGradeValue} onChange={e => setNewGradeValue(e.target.value)} className="flex-1 glass-input rounded-xl p-4 text-white font-bold text-center appearance-none">
                                                    {gradeOptions.map(v => <option key={v} value={v} className="bg-zinc-900">{v}</option>)}
                                                </select>
                                                <button onClick={addGrade} className="bg-white text-black px-8 rounded-xl font-bold active:scale-95 transition-transform">Salva</button>
                                            </div>
                                        </div>

                                        <div className="space-y-3">
                                            {grades.filter(g => g.subjectId === selectedSubjectId).reverse().map(g => {
                                                const color = getColorForGrade(g.value);
                                                return (
                                                    <div key={g.id} className="glass-panel p-5 rounded-2xl flex justify-between items-center">
                                                        <span className="font-black text-2xl" style={{ color: color }}>{g.value}</span>
                                                        <button onClick={() => setGrades(grades.filter(x => x.id !== g.id))} className="text-zinc-600 hover:text-red-500 transition-colors p-2"><Icons.Trash /></button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* TAB: SHOP */}
                        {activeTab === 'shop' && (
                            <div className="space-y-6 fade-in">
                                <h2 className="text-3xl font-bold">Ricompense</h2>
                                
                                <div className="glass
